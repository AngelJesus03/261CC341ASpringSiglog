# --- Aplicacion ---
spring.application.name=261CC341ASpringSigconBackend
server.port=8080

# --- PostgreSQL ---
# IMPORTANTE: cambia "tu_password_aqui" por la contrasena de tu PostgreSQL local
spring.datasource.url=jdbc:postgresql://localhost:5432/logicontrol_db
spring.datasource.username=postgres
spring.datasource.password=jijija03
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- JWT ---
# Clave secreta para firmar tokens JWT (en produccion usa una clave fuerte)
logicontrol.jwt.secret=logicontrol_clave_secreta_muy_larga_minimo_256_bits_para_hs256
logicontrol.jwt.expiration-ms=86400000

# --- SpringDoc OpenAPI / Swagger UI ---
# La documentacion interactiva estara disponible en:
#   http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
