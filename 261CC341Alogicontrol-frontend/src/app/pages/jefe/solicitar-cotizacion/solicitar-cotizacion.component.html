<app-navbar [breadcrumb]="'HomePage / Jefe Logísitico'"></app-navbar>

<div class="page-wrap">
  <div class="banner-titulo">
    <h1>Solicitar Cotización</h1>
  </div>

  <div class="banner-subtitulo">Datos del producto</div>

  <form [formGroup]="form" (ngSubmit)="enviar()" class="cot-form">
    <div class="row mb-3">
      <label class="col-sm-4 col-form-label">Tipo de producto:</label>
      <div class="col-sm-6">
        <input type="text" class="form-control-logi" formControlName="tipoProducto" />
      </div>
    </div>

    <div class="row mb-3">
      <label class="col-sm-4 col-form-label">Modelo:</label>
      <div class="col-sm-6">
        <input type="text" class="form-control-logi" formControlName="modelo" />
      </div>
    </div>

    <div class="row mb-3">
      <label class="col-sm-4 col-form-label">Cantidad del producto:</label>
      <div class="col-sm-6">
        <input type="number" class="form-control-logi" formControlName="cantidad" />
      </div>
    </div>

    <div class="row mb-3">
      <label class="col-sm-4 col-form-label">Fecha límite:</label>
      <div class="col-sm-6">
        <input type="date" class="form-control-logi" formControlName="fechaLimite" />
      </div>
    </div>

    <div class="row mb-3">
      <label class="col-sm-4 col-form-label">Dirección a enviar:</label>
      <div class="col-sm-6">
        <input type="text" class="form-control-logi" formControlName="direccion" />
      </div>
    </div>

    <div class="row mb-3">
      <label class="col-sm-4 col-form-label">Empresa a enviar:</label>
      <div class="col-sm-6">
        <input
          type="email"
          class="form-control-logi"
          formControlName="empresa"
          placeholder="proveedor@empresa.com"
        />
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Mensaje (opcional)</label>
      <textarea
        class="form-control-logi mensaje-area"
        rows="3"
        formControlName="mensaje"
      ></textarea>
    </div>

    <div class="form-check mb-4">
      <input
        type="checkbox"
        class="form-check-input"
        id="politicas"
        formControlName="politicas"
      />
      <label class="form-check-label ms-2" for="politicas">
        Acepto las Políticas de privacidad
      </label>
    </div>

    @if (enviado()) {
      <div class="alert-logi-ok mb-3">
        ✓ Cotización enviada al proveedor. Redirigiendo...
      </div>
    }

    <div class="d-flex justify-content-around mt-4">
      <button type="button" class="btn-logi" (click)="volver()">Volver</button>
      <button type="submit" class="btn-logi" [disabled]="form.invalid">Enviar</button>
    </div>
  </form>
</div>
